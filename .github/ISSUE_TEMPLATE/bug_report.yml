name: Bug Report
description: Report a reproducible bug in an AtomicMemory integration.
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include the plugin, adapter, command, and minimal config involved.
      placeholder: |
        1. Install package/plugin version ...
        2. Configure ...
        3. Run ...
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - CLI
        - MCP server
        - Claude Code plugin
        - Codex plugin
        - Hermes plugin
        - Vercel AI adapter
        - OpenAI Agents adapter
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package or plugin version
      placeholder: "@atomicmemory/integrations-* version, plugin version, or commit SHA"
  - type: input
    id: runtime
    attributes:
      label: Runtime
      placeholder: "Node version, agent host, OS, etc."
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or errors
      render: shell
