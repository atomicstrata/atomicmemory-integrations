name: Benchmark Case
description: Propose an integration benchmark, smoke test, or regression case.
labels: [benchmark]
body:
  - type: textarea
    id: scenario
    attributes:
      label: Scenario
      description: What integration behavior should the benchmark measure?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected signal
      description: What would a good result demonstrate?
    validations:
      required: true
  - type: textarea
    id: data
    attributes:
      label: Dataset or fixture
      description: Agent host, framework, backend, fixture, or provider requirements.
  - type: textarea
    id: notes
    attributes:
      label: Notes
